# ==========================================
# Upstream Definitions
# ==========================================
upstream crawler_api {
    server crawler-api:11235;
    keepalive 32;
}

upstream memory_api {
    server memory-api:8000;
    keepalive 32;
}

upstream platform_frontend {
    server platform-frontend:3000;
    keepalive 64;
}

upstream mcp_server {
    server mcp-server:3000;
    keepalive 16;
}

# ==========================================
# Gzip Compression
# ==========================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm;

# ==========================================
# Rate Limiting
# ==========================================
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/s;
limit_req_zone $binary_remote_addr zone=write:10m rate=20r/s;

proxy_cache_path /var/cache/nginx/ssr levels=1:2 keys_zone=ssr_cache:50m max_size=500m inactive=60m use_temp_path=off;

# ==========================================
# HTTP to HTTPS Redirect
# ==========================================
server {
    listen 80;
    server_name memory.velocitydigi.com engram.velocitydigi.com dv-syd-host01.icefish-discus.ts.net;

    # Allow Let's Encrypt ACME challenges over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# Main HTTPS Server
# ==========================================
server {
    listen 443 ssl;
    server_name _ memory.velocitydigi.com engram.velocitydigi.com dv-syd-host01.icefish-discus.ts.net;
    client_max_body_size 100M;
    server_tokens off;

    # ==========================================
    # SSL/TLS Configuration
    # ==========================================
    # Self-signed cert paths (generated via: docker compose exec nginx sh -c 'openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/certs/nginx-selfsigned.key -out /etc/nginx/certs/nginx-selfsigned.crt')
    # For production, upgrade to LetsEncrypt via certbot: certbot certonly --webroot -w /var/www/certbot -d memory.velocitydigi.com -d engram.velocitydigi.com
    ssl_certificate /etc/nginx/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (if using real certs)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ==========================================
    # Security Headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS (HTTP Strict Transport Security)
    # Note: For Tailscale self-signed certs, you may want to remove preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==========================================
    # Content Security Policy
    # ==========================================
    # CSP: Clerk uses clerk.com infrastructure + custom domain for routing
    # Tailscale origins included for internal access
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://clerk.velocitydigi.com https://accounts.velocitydigi.com https://*.clerk.com https://clerk.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://clerk.velocitydigi.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.clerk.com https://img.clerk.com https://clerk.velocitydigi.com; connect-src 'self' https://clerk.velocitydigi.com https://accounts.velocitydigi.com https://*.clerk.com https://api.clerk.com wss://$host ws://$host https://memory.velocitydigi.com https://engram.velocitydigi.com http://memory.velocitydigi.com http://engram.velocitydigi.com https://dv-syd-host01.icefish-discus.ts.net http://dv-syd-host01.icefish-discus.ts.net https://100.100.42.6 http://100.100.42.6; frame-src https://clerk.velocitydigi.com https://accounts.velocitydigi.com https://*.clerk.com; worker-src 'self' blob:;" always;

    # ==========================================
    # Resource Hints (Early Hints for performance)
    # ==========================================
    add_header Link "<https://fonts.googleapis.com>; rel=preconnect" always;
    add_header Link "<https://fonts.gstatic.com>; rel=preconnect; crossorigin" always;

    # ==========================================
    # Crawler API Proxy
    # ==========================================
    location /api/crawler/ {
        proxy_pass http://crawler_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        proxy_hide_header X-Powered-By;
        limit_req zone=api burst=50 nodelay;
    }

    # ==========================================
    # Memory API Proxy
    # ==========================================
    location /api/memory/ {
        proxy_pass http://memory_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header X-Powered-By;
        limit_req zone=api burst=50 nodelay;
    }

    # ==========================================
    # MCP Server Proxy (HTTP transport)
    # ==========================================
    location /mcp {
        proxy_pass http://mcp_server/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        proxy_hide_header X-Powered-By;
        limit_req zone=api burst=20 nodelay;
    }

    location /mcp/health {
        proxy_pass http://mcp_server/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        access_log off;
    }

    location /.well-known/oauth-authorization-server {
        proxy_pass http://mcp_server/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ==========================================
    # WebSocket Proxy for Crawl Progress
    # ==========================================
    location /ws {
        proxy_pass http://crawler_api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;
        proxy_hide_header X-Powered-By;
    }

    # ==========================================
    # Static Asset Caching
    # ==========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        proxy_pass http://platform_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ==========================================
    # Frontend (Catch-all)
    # ==========================================
    location / {
        proxy_pass http://platform_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        limit_req zone=general burst=100 nodelay;
        proxy_cache ssr_cache;
        proxy_cache_valid 200 1m;
        proxy_cache_bypass $http_cookie;
        proxy_cache_bypass $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ==========================================
    # Health Check Endpoint
    # ==========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
