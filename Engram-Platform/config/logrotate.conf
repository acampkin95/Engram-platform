# =============================================================================
# Engram Platform — Log Rotation Configuration
# =============================================================================
# This file configures log rotation for all Engram Platform logs

# Application logs
/opt/engram/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # Notify Docker containers to reopen log files
        for container in $(docker ps -q --filter "name=engram"); do
            docker kill -s USR1 $container 2>/dev/null || true
        done
    endscript
}

/opt/engram/scripts/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
}

/var/log/engram/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    sharedscripts
}

/var/log/engram/health-monitor.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0600 root root
}

# Docker container logs (via journald)
/var/log/docker/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
}

# Nginx logs
/var/log/nginx/engram-*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 `cat /var/run/nginx.pid` || true
    endscript
}

# System logs - keep more for debugging
/var/log/syslog {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root adm
}

/var/log/kern.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root adm
}
