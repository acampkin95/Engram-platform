# ─── Engram Platform Frontend — SonarQube Configuration ──────────────────────
sonar.projectKey=engram-platform-frontend
sonar.projectName=Engram Platform Frontend
sonar.projectVersion=0.1.0

# ─── Source ──────────────────────────────────────────────────────────────────
sonar.sources=src,app,middleware.ts
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ─── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  coverage/**,\
  test-results/**,\
  e2e/**,\
  public/**,\
  docs/**,\
  **/*.d.ts,\
  **/*.config.ts,\
  **/*.config.js

# ─── Language / Encoding ────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── Coverage (if available) ────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─── Server ──────────────────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000
