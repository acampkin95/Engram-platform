# =============================================================================
# Engram Platform — Docker Compose Configuration
# Tailscale-optimized with security hardening + Performance Optimized
# =============================================================================

services:
  # ==========================================
  # CRAWLER API - Crawl4AI with Engram addon
  # ==========================================
  crawler-api:
    build:
      context: ..
      dockerfile: Engram-AiCrawler/01_devroot/Dockerfile
      target: production
    image: crawl4ai-engram:latest
    container_name: engram-crawler-api
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      ENGRAM_ENABLED: "true"
      ENGRAM_API_URL: http://memory-api:8000
      ENGRAM_AUTO_STORE: "true"
      REDIS_URL: redis://crawler-redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-https://memory.velocitydigi.com,https://engram.velocitydigi.com,http://localhost:3002,http://localhost:5173,http://localhost:3000}
      ENGRAM_API_KEY: ${ENGRAM_API_KEY:-}
      APP_NAME: "crawl4ai-engram"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
      LOG_LEVEL: "INFO"
      API_HOST: "0.0.0.0"
      API_PORT: "11235"
      CRAWL4AI_VERSION: "0.5.0"
      BROWSER_TYPE: "chromium"
      HEADLESS: "true"
      VIEWPORT_WIDTH: "1920"
      VIEWPORT_HEIGHT: "1080"
      CACHE_ENABLED: "true"
      CACHE_MODE: "aggressive"
      WORD_COUNT_THRESHOLD: "50"
      PAGE_TIMEOUT: "60000"
      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://host.docker.internal:1234}
      LM_STUDIO_MODEL: "default"
      LM_STUDIO_TIMEOUT: "30"
      LM_STUDIO_MAX_RETRIES: "3"
      LM_STUDIO_RETRY_DELAY: "1"
      LM_STUDIO_TEMPERATURE: "0.7"
      REDIS_MAX_CONNECTIONS: "50"
      REDIS_SOCKET_TIMEOUT: "5"
      REDIS_SOCKET_CONNECT_TIMEOUT: "5"
      CHROMADB_PATH: "/app/data/chroma"
      CHROMADB_COLLECTION_PREFIX: "crawl4ai_"
      CHROMADB_SIMILARITY_THRESHOLD: "0.7"
      CHROMADB_EMBEDDING_BATCH_SIZE: "100"
      DATA_HOT_PATH: "/app/data/tiers/hot"
      DATA_WARM_PATH: "/app/data/tiers/warm"
      DATA_COLD_PATH: "/app/data/tiers/cold"
      DATA_ARCHIVE_PATH: "/app/data/tiers/archive"
      WATCHDOG_CHECK_INTERVAL_SECONDS: "300"
      WATCHDOG_ORPHAN_AGE_MINUTES: "60"
      WATCHDOG_MEMORY_THRESHOLD_PERCENT: "85"
      WATCHDOG_DISK_THRESHOLD_PERCENT: "90"
      WATCHDOG_MEMORY_CHECK_ENABLED: "true"
      WATCHDOG_DISK_CHECK_ENABLED: "true"
      DATA_HOT_MAX_AGE_HOURS: "24"
      DATA_WARM_MAX_AGE_DAYS: "7"
      DATA_COLD_MAX_AGE_DAYS: "30"
      DATA_OFFLOAD_THRESHOLD_DAYS: "14"
      DATA_ARCHIVE_THRESHOLD_GB: "10"
      DATA_CLEANUP_INTERVAL_MINUTES: "60"
    volumes:
      - crawler_cache:/app/data/cache
      - crawler_logs:/app/data/logs
      - crawler_hot:/app/data/tiers/hot
      - crawler_warm:/app/data/tiers/warm
      - crawler_cold:/app/data/tiers/cold
      - crawler_archive:/app/data/tiers/archive
      - crawler_chroma_data:/app/data/chroma
      - crawler_supervisor:/var/log/supervisor
    shm_size: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost:11235/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 768M
    depends_on:
      crawler-redis:
        condition: service_healthy
      memory-api:
        condition: service_healthy
    networks:
      - engram-platform-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # MEMORY API - Python Vector Memory System
  # ==========================================
  memory-api:
    build:
      context: ..
      dockerfile: Engram-AiMemory/docker/Dockerfile.memory-api
    image: engram-memory-api:latest
    container_name: engram-memory-api
    restart: unless-stopped
    ports:
      # Tailscale direct access - binds to all interfaces for Tailscale VPN
      # Accessible via: http://100.100.42.6:8000 or http://dv-syd-host01.icefish-discus.ts.net:8000
      - "${MEMORY_API_BIND:-0.0.0.0}:8000:8000"
    environment:
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_GRPC_URL: http://weaviate:50051
      REDIS_URL: redis://memory-redis:6379
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      MULTI_TENANCY_ENABLED: "true"
      DEFAULT_TENANT_ID: default
      LOG_LEVEL: INFO
      # CORS: Include Tailscale origins for direct access
      CORS_ORIGINS: ${CORS_ORIGINS:-https://memory.velocitydigi.com,https://engram.velocitydigi.com,http://localhost:3002,http://localhost:3001,http://localhost,http://100.100.42.6:3002,http://dv-syd-host01.icefish-discus.ts.net:3002,https://dv-syd-host01.icefish-discus.ts.net}
      JWT_SECRET: ${JWT_SECRET}
      MEMORY_API_KEY: ${MEMORY_API_KEY:-}
      API_KEYS: ${API_KEYS:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      CLEAN_SCHEMA_MIGRATION: ${CLEAN_SCHEMA_MIGRATION:-false}
      # Performance optimizations
      UVICORN_WORKERS: "2"
      UVICORN_LIMIT_CONN: "100"
      UVICORN_KEEPALIVE: "5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 192M
    depends_on:
      weaviate:
        condition: service_healthy
      memory-redis:
        condition: service_healthy
    networks:
      - engram-platform-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m


  # ==========================================
  # WEAVIATE - Vector Database (Optimized)
  # ==========================================
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: engram-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: "100"
      QUERY_MAXIMUM_TIMEOUT: "60s"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: "offload-s3"
      CLUSTER_HOSTNAME: "weaviate"
      MULTI_TENANCY_ENABLED: "true"
      REPLICATION_FACTOR: "1"
      # Performance tuning
      GOMEMLIMIT: "1200MiB"
      GOMAXPROCS: "2"
      ENABLE_TurboBoost: "true"
      # Connection pool
      GRPC_MAX_CONCURRENT_STREAMS: "100"
      GRPC_INITIAL_WINDOW_SIZE: "65536"
      # Caching
      CACHE_ENABLED: "true"
      CACHE_SIZE: "384MB"
      CACHE_TTL: "3600"
    volumes:
      - weaviate_data:/var/lib/weaviate
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 384M
    networks:
      - engram-platform-network

  # ==========================================
  # CRAWLER REDIS - Cache for Crawler (Optimized)
  # ==========================================
  crawler-redis:
    image: redis:7-alpine
    container_name: engram-crawler-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 384mb --maxmemory-policy allkeys-lru --tcp-keepalive 300 --timeout 0
    volumes:
      - crawler_redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 192M
    networks:
      - engram-platform-network

  # ==========================================
  # MEMORY REDIS - Cache for Memory API (Optimized)
  # ==========================================
  memory-redis:
    image: redis:7-alpine
    container_name: engram-memory-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --tcp-keepalive 300 --timeout 0
    volumes:
      - memory_redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - engram-platform-network

  # ==========================================
  # MCP SERVER - Model Context Protocol
  # ==========================================
  mcp-server:
    build:
      context: ../Engram-MCP
      dockerfile: docker/Dockerfile
    image: engram-mcp-server:latest
    container_name: engram-mcp-server
    restart: unless-stopped
    environment:
      MEMORY_API_URL: http://memory-api:8000
      MCP_SERVER_NAME: engram-mcp
      MCP_SERVER_VERSION: "1.0.0"
      MCP_SERVER_PORT: "3000"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      OAUTH_ENABLED: ${OAUTH_ENABLED:-true}
      OAUTH_ISSUER: ${OAUTH_ISSUER:-https://dv-syd-host01.icefish-discus.ts.net}
      OAUTH_SECRET: ${OAUTH_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://memory.velocitydigi.com,https://engram.velocitydigi.com,http://localhost:3002,http://localhost:3001,http://localhost:3000}
      AI_MEMORY_API_KEY: ${MEMORY_API_KEY:-}
      OAUTH_REDIS_URL: redis://memory-redis:6379
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 96M
    depends_on:
      memory-api:
        condition: service_healthy
    networks:
      - engram-platform-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m
    # profiles:
    #   - mcp  # Remove profile to always start MCP server

  # ==========================================
  # PLATFORM FRONTEND - Next.js Web UI
  # ==========================================
  platform-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_MEMORY_API_KEY: ${NEXT_PUBLIC_MEMORY_API_KEY:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://memory.velocitydigi.com}
        NEXT_PUBLIC_CLERK_DOMAIN: ${NEXT_PUBLIC_CLERK_DOMAIN:-clerk.velocitydigi.com}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
        CRAWLER_API_URL: http://crawler-api:11235
        MEMORY_API_URL: http://memory-api:8000
    container_name: engram-platform-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /app/.next/cache:size=32m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://memory.velocitydigi.com}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_CLERK_DOMAIN: ${NEXT_PUBLIC_CLERK_DOMAIN:-clerk.velocitydigi.com}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CRAWLER_API_URL: http://crawler-api:11235
      MEMORY_API_URL: http://memory-api:8000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 96M
    networks:
      - engram-platform-network

  # ==========================================
  # NGINX - Reverse Proxy & Load Balancer
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: engram-nginx
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:80:80"
      - "${BIND_ADDRESS:-127.0.0.1}:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    tmpfs:
      - /var/cache/nginx:size=256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 48M
    depends_on:
      - crawler-api
      - memory-api
      - platform-frontend
    networks:
      engram-platform-network:
        aliases:
          - memory.velocitydigi.com
          - engram.velocitydigi.com
          - ${TAILSCALE_HOSTNAME:-dv-syd-host01.icefish-discus.ts.net}

# ==========================================
# VOLUMES
# ==========================================
volumes:
  # Crawler volumes (prefixed: crawler_*)
  crawler_cache:
    driver: local
  crawler_logs:
    driver: local
  crawler_hot:
    driver: local
  crawler_warm:
    driver: local
  crawler_cold:
    driver: local
  crawler_archive:
    driver: local
  crawler_chroma_data:
    driver: local
  crawler_supervisor:
    driver: local
  crawler_redis_data:
    driver: local

  # Memory volumes (prefixed: memory_*)
  memory_redis_data:
    driver: local
  weaviate_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  engram-platform-network:
    driver: bridge
