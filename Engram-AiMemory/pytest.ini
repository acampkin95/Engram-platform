[pytest]
asyncio_mode = auto
testpaths = packages/core/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    benchmark: marks tests as performance benchmarks
    live: marks tests that require live Weaviate instance
    stability: marks tests for stability testing
    smoke: marks tests as smoke tests
    weaviate: marks tests related to Weaviate functionality
    unit: marks tests as unit tests (default)
    e2e: marks tests as end-to-end tests

addopts = 
    -v
    --tb=short
    --strict-markers
    --ignore=packages/core/tests/investigation/test_e2e.py
    -m "not live and not smoke and not benchmark and not stability"

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
