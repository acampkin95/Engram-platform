# =============================================================================
# AI Memory System — Nginx Reverse Proxy
# Domain: memory.velocitydigi.com
# Access: Cloudflare → Tailscale only (no direct public internet)
#
# Routes:
#   /mcp        → mcp-server:3000  (Streamable HTTP, SSE-capable)
#   /api/       → memory-api:8000  (FastAPI)
#   /health     → memory-api:8000  (health passthrough)
#   /           → dashboard:3000   (Next.js)
# =============================================================================

# Tune worker count to available CPU cores
worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ---------------------------------------------------------------------------
    # Core settings
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75s;
    server_tokens   off;

    # Larger buffers for SSE / streaming responses
    proxy_buffering         off;
    proxy_request_buffering off;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------------
    # Upstreams
    # ---------------------------------------------------------------------------
    upstream memory_api {
        server memory-api:8000;
        keepalive 32;
    }

    upstream mcp_server {
        server mcp-server:3000;
        keepalive 32;
    }

    upstream dashboard {
        # dashboard container listens on port 3000 internally
        server dashboard:3000;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    # MCP endpoint — 30 req/s per IP (burst to 60)
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=30r/s;
    # API endpoint — 60 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

    # ---------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name memory.velocitydigi.com;

        # Cloudflare health-check path (plain HTTP allowed)
        location = /health {
            proxy_pass http://memory_api;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # Main HTTPS server
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2  on;
        server_name memory.velocitydigi.com;

        # -----------------------------------------------------------------------
        # SSL — certificates managed by Certbot / Tailscale serve
        # Paths must match the ssl volume mount in docker-compose.yml
        # -----------------------------------------------------------------------
        ssl_certificate     /etc/letsencrypt/live/memory.velocitydigi.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/memory.velocitydigi.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Max upload size (for batch memory operations)
        client_max_body_size 50m;

        # -----------------------------------------------------------------------
        # /mcp — MCP Streamable HTTP Transport (2025-06-18)
        # Supports: POST (JSON-RPC), GET (SSE stream), DELETE (session close)
        # -----------------------------------------------------------------------
        location /mcp {
            limit_req zone=mcp_limit burst=60 nodelay;

            proxy_pass http://mcp_server;
            proxy_http_version 1.1;

            # Required for SSE (GET /mcp) — disable buffering, keep connection alive
            proxy_set_header Connection       "";
            proxy_buffering                   off;
            proxy_cache                       off;
            proxy_read_timeout                3600s;   # 1 hour — SSE streams are long-lived
            proxy_send_timeout                3600s;

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass MCP protocol headers through
            proxy_pass_header Mcp-Session-Id;
            proxy_pass_header MCP-Protocol-Version;
        }

        # -----------------------------------------------------------------------
        # /api/ — FastAPI Memory API
        # -----------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=120 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://memory_api;
            proxy_http_version 1.1;
            proxy_set_header Connection       "";
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # -----------------------------------------------------------------------
        # /health — passthrough to API (no rate limit, used by monitoring)
        # -----------------------------------------------------------------------
        location = /health {
            proxy_pass http://memory_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # -----------------------------------------------------------------------
        # / — Next.js Dashboard (catch-all)
        # -----------------------------------------------------------------------
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;

            # WebSocket support for Next.js HMR / live reload
            proxy_set_header Upgrade          $http_upgrade;
            proxy_set_header Connection       "upgrade";

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
