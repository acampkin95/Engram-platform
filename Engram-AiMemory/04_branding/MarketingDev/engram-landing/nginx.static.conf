server {
    listen 3099;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /marketing-static/ {
        alias /usr/share/nginx/html/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
