name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check packages/core/src/memory_system/
      - name: Ruff format check
        run: ruff format --check packages/core/src/memory_system/
      - name: Mypy type check
        run: mypy packages/core/src/memory_system/api.py --ignore-missing-imports
        continue-on-error: true  # non-blocking until Phase 6 type fixes complete

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest packages/core/tests/ -v --no-header --tb=short
        env:
          JWT_SECRET: test-secret-for-ci-only-not-production

  ts-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Biome check (MCP server)
        run: npx biome check packages/mcp-server/src packages/cli/src
      - name: Biome check (Dashboard source)
        run: npx biome check packages/dashboard/app packages/dashboard/components packages/dashboard/hooks packages/dashboard/lib packages/dashboard/types
        continue-on-error: true  # pre-existing a11y issues

  ts-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build MCP server
        run: npm run build -w packages/mcp-server
      - name: Build dashboard
        run: npm run build -w packages/dashboard
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  ts-test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run dashboard tests
        run: npm run test:run -w packages/dashboard
