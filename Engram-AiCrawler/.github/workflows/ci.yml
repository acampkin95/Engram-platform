# ============================================================================
# Engram-AiCrawler CI/CD Pipeline
# Python FastAPI + React 18 OSINT Platform
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '01_devroot/app/**'
      - '01_devroot/tests/**'
      - '01_devroot/frontend/**'
      - '01_devroot/requirements.txt'
      - '01_devroot/frontend/package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '01_devroot/app/**'
      - '01_devroot/tests/**'
      - '01_devroot/frontend/**'
      - '01_devroot/requirements.txt'
      - '01_devroot/frontend/package.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  CI: true

permissions:
  contents: read

jobs:
  # ============================================================================
  # Python Backend
  # ============================================================================

  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '01_devroot/requirements.txt'

      - name: Install dependencies
        working-directory: 01_devroot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        working-directory: 01_devroot
        run: ruff check app/

      - name: Ruff format check
        working-directory: 01_devroot
        run: ruff format --check app/

      - name: MyPy type check
        working-directory: 01_devroot
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # non-blocking until type coverage improves

  python-test:
    name: Python Tests with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [python-lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '01_devroot/requirements.txt'

      - name: Install dependencies
        working-directory: 01_devroot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        working-directory: 01_devroot
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=75 \
            -v \
            --tb=short \
            --no-header
        env:
          JWT_SECRET: test-secret-for-ci-only-not-production
          REDIS_URL: redis://localhost:6379
          CLERK_SECRET_KEY: test-clerk-secret
          CLERK_PUBLISHABLE_KEY: test-clerk-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-report
          path: 01_devroot/htmlcov/
          retention-days: 7

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-xml
          path: 01_devroot/coverage.xml
          retention-days: 7

  # ============================================================================
  # React Frontend
  # ============================================================================

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '01_devroot/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: 01_devroot/frontend
        run: npm ci --prefer-offline

      - name: Run Biome lint
        working-directory: 01_devroot/frontend
        run: npx biome check src/

      - name: TypeScript type check
        working-directory: 01_devroot/frontend
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '01_devroot/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: 01_devroot/frontend
        run: npm ci --prefer-offline

      - name: Build frontend
        working-directory: 01_devroot/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:11235

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: 01_devroot/frontend/dist/
          retention-days: 1

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '01_devroot/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: 01_devroot/frontend
        run: npm ci --prefer-offline

      - name: Run unit tests
        working-directory: 01_devroot/frontend
        run: npm run test:run
        env:
          VITE_API_URL: http://localhost:11235

  # ============================================================================
  # E2E Tests (Optional - Resource Intensive)
  # ============================================================================

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [python-test, frontend-test]
    # Only run on main branch pushes to save resources
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '01_devroot/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '01_devroot/frontend/package-lock.json'

      - name: Install Python dependencies
        working-directory: 01_devroot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: 01_devroot/frontend
        run: npm ci --prefer-offline

      - name: Install Playwright browsers
        working-directory: 01_devroot/frontend
        run: npx playwright install --with-deps

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: 01_devroot/frontend/dist/

      - name: Run E2E tests
        working-directory: 01_devroot/frontend
        run: npx playwright test
        env:
          VITE_API_URL: http://localhost:11235
          JWT_SECRET: test-secret-for-ci-only-not-production
          REDIS_URL: redis://localhost:6379

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: 01_devroot/frontend/playwright-report/
          retention-days: 7

  # ============================================================================
  # Security & Quality Gates
  # ============================================================================

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Check Python dependencies for vulnerabilities
        working-directory: 01_devroot
        run: safety check -r requirements.txt --full-report
        continue-on-error: true  # non-blocking until dependencies are updated

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm audit
        run: npm install -g npm-audit

      - name: Check frontend dependencies for vulnerabilities
        working-directory: 01_devroot/frontend
        run: npm audit --audit-level=moderate
        continue-on-error: true  # non-blocking until dependencies are updated

  # ============================================================================
  # Summary Job
  # ============================================================================

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [python-lint, python-test, frontend-lint, frontend-build, frontend-test]
    if: always()

    steps:
      - name: Check job status
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Lint | ${{ needs.python-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tests | ${{ needs.python-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint | ${{ needs.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.python-test.result }}" != "success" ] || [ "${{ needs.frontend-test.result }}" != "success" ]; then
            echo "❌ CI failed - check individual job logs"
            exit 1
          fi

          echo "✅ All CI checks passed!"
