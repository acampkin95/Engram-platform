[mypy]
# MyPy Configuration for Crawl4AI OSINT Container
# https://mypy.readthedocs.io/

python_version = 3.11

# Warn about any return type
warn_return_any = true

# Warn about unused ignores
warn_unused_ignores = true

# Strict optional type checking
strict_optional = true

# Disallow dynamic typing
disallow_any_generics = true
disallow_untyped_defs = false  # Allow gradually adding types

# Show error codes
show_error_codes = true
show_column_numbers = true
show_error_context = true
color_output = true
error_summary = true

# Import discovery
mypy_path = $MYPY_CONFIG_FILE_DIR
namespace_packages = true
explicit_package_bases = true

# Ignore errors in third-party libraries (they may not have stubs)
[[tool.mypy.overrides]]
module = "fastapi.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "openai.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "uvicorn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "uvloop.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "websockets.*"
ignore_missing_imports = true
