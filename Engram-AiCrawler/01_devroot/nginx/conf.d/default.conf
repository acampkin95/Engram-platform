# nginx/conf.d/default.conf — OSINT Investigation Platform site config
# Handles: HTTP→HTTPS redirect, SSL termination, WebSocket proxy, static files

# Upstream: FastAPI app container
upstream osint_app {
    server app:11235;
    keepalive 32;
}

# HTTP → HTTPS redirect + ACME challenge for certbot
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot ACME challenge (webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy    $csp_header always;

    # Connection limits
    limit_conn conn_limit 20;

    # --- Static frontend assets ---
    root /app/frontend/dist;
    index index.html;

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- API endpoints ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://osint_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Longer timeout for deep crawl operations
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;

        # Disable buffering for streaming responses
        proxy_buffering    off;
        proxy_cache        off;
    }

    # --- WebSocket endpoint ---
    location /ws {
        proxy_pass         http://osint_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket keepalive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # --- Health check (no rate limit, no auth) ---
    location /health {
        proxy_pass         http://osint_app/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # --- Docs (FastAPI OpenAPI UI) ---
    location ~ ^/(docs|redoc|openapi.json) {
        limit_req zone=general burst=10 nodelay;
        proxy_pass         http://osint_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SPA fallback (React/Vue frontend) ---
    location / {
        limit_req zone=general burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # --- Block common attack paths ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404              /404.html;
    error_page 500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
