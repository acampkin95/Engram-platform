# nginx/nginx.conf — Global nginx configuration for OSINT Investigation Platform

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;

    # Buffer sizes
    client_body_buffer_size     128k;
    client_max_body_size        50m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout   60s;
    client_header_timeout 60s;
    send_timeout          60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    300s;  # Long for deep crawl operations

    # Gzip compression
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_buffers       16 8k;
    gzip_http_version  1.1;
    gzip_min_length    256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr  zone=api:10m       rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m      rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=general:10m   rate=60r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # SSL settings (shared across vhosts)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    # Security headers map (applied per-location in site config)
    map $sent_http_content_type $csp_header {
        default                    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; frame-ancestors 'none';";
        "text/html"                "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; frame-ancestors 'none';";
    }

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
