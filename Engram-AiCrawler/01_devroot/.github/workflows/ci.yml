name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01_devroot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 01_devroot/requirements.txt
      - run: pip install ruff
      - run: ruff check app/ --config ruff.toml
      - run: ruff format --check app/ --config ruff.toml

  typecheck:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01_devroot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 01_devroot/requirements.txt
      - run: pip install -r requirements.txt mypy types-PyYAML types-redis
      - run: mypy app/ --config-file mypy.ini --ignore-missing-imports

  test:
    name: Test (Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01_devroot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 01_devroot/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          CLERK_SECRET_KEY: test-secret-key
          CLERK_JWT_KEY: test-jwt-key
          AUTH_ENABLED: "false"
          RATE_LIMIT_ENABLED: "false"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: 01_devroot
          file: 01_devroot/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: crawl4ai-osint:${{ github.sha }}
